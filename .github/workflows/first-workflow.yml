name: KaamWala CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build React Application
        run: npm run build

  backend-build:
    name: Backend Dependency Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Backend Dependencies
        run: npm install

  frontend-docker-build:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Frontend Docker Image
        run: docker build -t ahsan1762/kaamwala-frontend:latest ./frontend

      - name: Push Frontend Docker Image
        run: docker push ahsan1762/kaamwala-frontend:latest

  backend-docker-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Backend Docker Image
        run: docker build -t ahsan1762/kaamwala-backend:latest ./backend

      - name: Push Backend Docker Image
        run: docker push ahsan1762/kaamwala-backend:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    needs:
      - frontend-docker-build
      - backend-docker-build

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.2.2

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /opt/kaamwala
            docker compose pull
            docker compose up -d
            docker image prune -f
