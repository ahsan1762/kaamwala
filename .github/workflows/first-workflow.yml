frontend-docker-build:
  name: Frontend Docker Build
  runs-on: ubuntu-latest
  needs: frontend-build

  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Frontend Docker Image
      run: docker build -t ahsan1762/kaamwala-frontend:latest ./frontend

    - name: Push Frontend Docker Image
      run: docker push ahsan1762/kaamwala-frontend:latest
backend-docker-build:
  name: Backend Docker Build
  runs-on: ubuntu-latest
  needs: backend-build

  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Backend Docker Image
      run: docker build -t ahsan1762/kaamwala-backend:latest ./backend

    - name: Push Backend Docker Image
      run: docker push ahsan1762/kaamwala-backend:latest
